# Multi-user deployment with the app's OWN self-service login
# (AOS8_AUTH_MODE=accounts): engineers register with a verified @hpe.com email
# and a password — no OAuth, no IdP.
#
# ── PUT TLS IN FRONT ─────────────────────────────────────────────────────────
# Passwords and verification codes traverse the connection, so terminate HTTPS
# at your farm's ingress / load balancer (or a reverse proxy such as Caddy,
# nginx or Traefik) ahead of this service. Do not expose plain :8501 to users
# over an untrusted network.
#
# ── PERSISTENCE ──────────────────────────────────────────────────────────────
# The named volume keeps the user registry (users.json) and the per-user
# encrypted credential files across restarts. Without it, accounts and saved
# creds reset on every redeploy. Keep AOS8_CREDSTORE_KEY stable across deploys
# (a changed key just makes old saved creds unreadable — no crash).
#
# ── SCALING ──────────────────────────────────────────────────────────────────
# Streamlit sessions are websocket-bound to one replica. If you scale `app`,
# pin each user to one replica (cookie/IP affinity) at the LB AND make the
# volume shared so every replica sees the same accounts.

services:
  app:
    build: .
    ports:
      - "8501:8501"           # ⚠ put your TLS-terminating ingress/LB in front
    environment:
      AOS8_AUTH_MODE: "accounts"
      AOS8_ALLOWED_EMAIL_DOMAIN: "hpe.com"
      # Per-user encrypted "Remember" (optional). Generate once:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Leave UNSET to disable credential persistence (session-only).
      AOS8_CREDSTORE_KEY: "${AOS8_CREDSTORE_KEY:-}"
      # SMTP for verification emails. Without a host, codes are written to the
      # container log (DEV ONLY) — set these for any real deployment.
      AOS8_SMTP_HOST: "${AOS8_SMTP_HOST:-}"
      AOS8_SMTP_PORT: "${AOS8_SMTP_PORT:-587}"
      AOS8_SMTP_USER: "${AOS8_SMTP_USER:-}"
      AOS8_SMTP_PASS: "${AOS8_SMTP_PASS:-}"
      AOS8_SMTP_FROM: "${AOS8_SMTP_FROM:-no-reply@hpe.com}"
    volumes:
      - aos8_state:/home/appuser/.aos8-migration
    restart: unless-stopped

volumes:
  aos8_state:
