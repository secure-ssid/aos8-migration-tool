# Multi-user deployment with the app's OWN self-service login
# (AOS8_AUTH_MODE=accounts): users register with a verified email and a
# password — no OAuth, no IdP.
#
# ── HTTPS via Caddy ──────────────────────────────────────────────────────────
# This service binds to 127.0.0.1 only, so it is NOT publicly reachable; your
# Caddy server terminates HTTPS and reverse-proxies to it (see deploy/Caddyfile).
#   - Caddy on the HOST  -> proxy to localhost:8501 (the binding below).
#   - Caddy in a CONTAINER -> drop the published port, put both on one network,
#     and proxy to http://app:8501 instead.
# Passwords + verification codes ride the connection, so always go through Caddy
# (HTTPS), never plain :8501 over an untrusted network.
#
# ── PERSISTENCE ──────────────────────────────────────────────────────────────
# The named volume keeps the user registry (users.json) and the per-user
# encrypted credential files across restarts. Keep AOS8_CREDSTORE_KEY stable.
#
# ── SCALING ──────────────────────────────────────────────────────────────────
# Streamlit sessions are websocket-bound to one replica; if you scale `app`, pin
# each user to one replica (cookie/IP affinity) and share the volume.

services:
  app:
    build: .
    ports:
      - "8501:8501"   # externally reachable — Caddy on separate host fronts HTTPS
    environment:
      # Simplest multi-user: one shared gate password (no registration, no email).
      AOS8_AUTH_MODE: "${AOS8_AUTH_MODE:-password}"
      AOS8_APP_PASSWORD: "${AOS8_APP_PASSWORD:?set a shared password in .env}"
      # Per-user encrypted "Remember" (optional). In password mode this is a
      # single SHARED store. Generate once:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      AOS8_CREDSTORE_KEY: "${AOS8_CREDSTORE_KEY:-}"
      # ── Only used if you switch AOS8_AUTH_MODE=accounts (per-person login) ──
      AOS8_ALLOWED_EMAIL_DOMAIN: "${AOS8_ALLOWED_EMAIL_DOMAIN:-}"
      AOS8_SMTP_MODE: "${AOS8_SMTP_MODE:-}"
      AOS8_SMTP_FROM: "${AOS8_SMTP_FROM:-}"
      AOS8_SMTP_HOST: "${AOS8_SMTP_HOST:-}"
      AOS8_SMTP_PORT: "${AOS8_SMTP_PORT:-587}"
      AOS8_SMTP_USER: "${AOS8_SMTP_USER:-}"
      AOS8_SMTP_PASS: "${AOS8_SMTP_PASS:-}"
    volumes:
      - aos8_state:/home/appuser/.aos8-migration
    restart: unless-stopped

volumes:
  aos8_state:
