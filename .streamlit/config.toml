[theme]
# base=dark matters: component internals Streamlit derives from the base
# theme (most visibly st.code block backgrounds) would otherwise come from
# the LIGHT base — white panels all over an otherwise dark app.
base = "dark"
primaryColor = "#FF8300"
backgroundColor = "#0B1220"
secondaryBackgroundColor = "#121C30"
textColor = "#E6EDF7"
codeBackgroundColor = "#121C30"
font = "sans serif"

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[server]
headless = false
# hot-reload on file change so code edits don't need a server restart
runOnSave = true
fileWatcherType = "auto"
